<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>수촌 FC 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#111;color:#fff;min-height:100vh;overscroll-behavior:none}
#splash{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.6s}
#splash.fade{opacity:0;pointer-events:none}
.sp-stripe{position:absolute;inset:0;background:repeating-linear-gradient(170deg,#8b0000 0px,#8b0000 38px,#1a1a1a 38px,#1a1a1a 76px);opacity:0.18}
.sp-wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:18px}
.sp-title{font-size:28px;font-weight:800;letter-spacing:4px;color:#fff}
.sp-sub{font-size:13px;letter-spacing:2px;color:#c0a060;font-weight:600}
.sp-btn{background:#8b0000;color:#fff;border:none;padding:13px 38px;border-radius:30px;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer}
.sp-btn:active{background:#a00}
.sp-badge{font-size:11px;color:#555;letter-spacing:0.5px}
#app{display:none;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;background:#181818}
.hdr{background:#8b0000;padding:10px 14px 0;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hdr-title{flex:1;font-size:17px;font-weight:800;letter-spacing:1px;color:#fff}
.rtpill{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.3);border-radius:20px;padding:4px 10px;font-size:11px;color:#fff;cursor:pointer}
.rtdot{width:7px;height:7px;border-radius:50%;background:#4caf50;flex-shrink:0}
.rtdot.off{background:#f44336}
.rtdot.sync{background:#ff9800;animation:spin 1s linear infinite}
.rtdot.ok{animation:pulse 2s infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:7px 14px;border-radius:16px 16px 0 0;font-size:13px;font-weight:700;border:none;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);cursor:pointer;white-space:nowrap}
.tab.on{background:#fff;color:#8b0000}
.sec{display:none;padding:12px 12px 90px;background:#181818;min-height:calc(100vh - 105px)}
.sec.on{display:block}
.card{background:#242424;border:0.5px solid rgba(255,255,255,0.09);border-radius:14px;padding:14px;margin-bottom:10px}
.ct{font-size:11px;font-weight:700;letter-spacing:0.8px;color:#777;margin-bottom:10px;text-transform:uppercase}
label{font-size:12px;color:#888;display:block;margin-bottom:3px;margin-top:8px}
label:first-child{margin-top:0}
input,select{width:100%;padding:9px 11px;font-size:14px;border:0.5px solid rgba(255,255,255,0.14);border-radius:8px;background:#2e2e2e;color:#fff;-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:#c0392b}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{width:100%;padding:12px;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-top:10px}
.btn-r{background:#8b0000;color:#fff}
.btn-r:active{background:#a00}
.btn-g{background:#1b4d1b;color:#81c784}
.btn-g:active{background:#144014}
.bsm{padding:5px 11px;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;width:auto}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px}
.bgr{background:#3a0000;color:#ff8080}
.bgo{background:#2e1a00;color:#ffb74d}
.bgb{background:#0a1e38;color:#64b5f6}
.bgg{background:#0d2e0d;color:#81c784}
.bgy{background:#2a2a2a;color:#999}
.pi{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid rgba(255,255,255,0.06)}
.pi:last-child{border-bottom:none}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.pn{flex:1;min-width:0}
.pname{font-size:14px;font-weight:700;color:#fff}
.pst{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.mi{padding:12px 0;border-bottom:0.5px solid rgba(255,255,255,0.06)}
.mi:last-child{border-bottom:none}
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.msc{font-size:18px;font-weight:800;color:#fff}
.mme{font-size:12px;color:#666;margin-bottom:6px}
.mac{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.fi{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,0.06)}
.fi:last-child{border-bottom:none}
.fn{font-size:14px;font-weight:600;color:#fff;min-width:55px}
.fms{display:flex;gap:3px;flex-wrap:wrap;flex:1}
.fb{width:26px;height:26px;border-radius:50%;border:0.5px solid rgba(255,255,255,0.12);background:#2e2e2e;color:#777;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.fb.paid{background:#8b0000;color:#fff;border-color:#8b0000}
.qc{padding:7px 12px;border-radius:20px;border:0.5px solid rgba(255,255,255,0.12);background:#2e2e2e;font-size:13px;cursor:pointer;color:#bbb;user-select:none}
.qc.sel{background:#8b0000;color:#fff;border-color:#8b0000}
.qrc{background:#2a2a2a;border-radius:10px;padding:10px;margin-bottom:8px}
.qrt{font-size:11px;font-weight:700;color:#777;margin-bottom:6px;letter-spacing:0.5px}
.qrp{display:flex;flex-wrap:wrap;gap:5px}
.qrch{font-size:12px;padding:3px 9px;border-radius:10px;background:#333;color:#ccc}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sb{background:#242424;border-radius:10px;padding:12px;text-align:center}
.sbv{font-size:22px;font-weight:800;color:#fff}
.sbl{font-size:11px;color:#666;margin-top:2px}
.rt{width:100%;font-size:13px;border-collapse:collapse}
.rt th{font-size:11px;color:#666;text-align:left;padding:6px;border-bottom:0.5px solid rgba(255,255,255,0.07)}
.rt td{padding:8px 6px;border-bottom:0.5px solid rgba(255,255,255,0.07);vertical-align:middle;color:#fff}
.rt tr:last-child td{border-bottom:none}
.ni{width:48px;padding:4px 6px;font-size:13px;border:0.5px solid rgba(255,255,255,0.13);border-radius:6px;text-align:center;background:#2e2e2e;color:#fff}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,0.96);color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;font-weight:600;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:9999;white-space:nowrap;border:0.5px solid rgba(255,255,255,0.15)}
#toast.show{opacity:1}
#loading{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:998}
.ld-spin{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#8b0000;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:14px}

/* 참석 투표 */
.vote-card{background:#242424;border:0.5px solid rgba(255,255,255,0.09);border-radius:14px;padding:14px;margin-bottom:12px}

/* 일정 수정 모달 */
#edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:997;align-items:flex-end;justify-content:center}
#edit-modal.show{display:flex}
.edit-sheet{background:#242424;border-radius:18px 18px 0 0;padding:20px 16px 36px;width:100%;max-width:480px;border-top:0.5px solid rgba(255,255,255,0.12)}
.edit-sheet-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.vote-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.vote-date{font-size:16px;font-weight:800;color:#fff}
.vote-info{font-size:12px;color:#888;margin-top:2px}
.vote-opp{font-size:13px;color:#c0a060;font-weight:600;margin-top:2px}
.vote-btns{display:flex;gap:6px;margin-bottom:10px}
.vbtn{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s}
.vbtn.attend{background:#1b4d1b;color:#81c784}
.vbtn.attend.active{background:#2d7a2d;color:#fff;box-shadow:0 0 0 2px #81c784}
.vbtn.absent{background:#3a1a1a;color:#ff8080}
.vbtn.absent.active{background:#7a2d2d;color:#fff;box-shadow:0 0 0 2px #ff8080}
.vbtn.maybe{background:#2e2200;color:#ffb74d}
.vbtn.maybe.active{background:#6b4f00;color:#fff;box-shadow:0 0 0 2px #ffb74d}
.vote-counts{display:flex;gap:6px;margin-bottom:8px}
.vc{flex:1;background:#2a2a2a;border-radius:8px;padding:8px;text-align:center}
.vc-num{font-size:18px;font-weight:800}
.vc-lbl{font-size:10px;color:#777;margin-top:1px}
.vote-members{display:flex;flex-wrap:wrap;gap:4px}
.vm-chip{font-size:11px;padding:3px 8px;border-radius:10px}
.vm-o{background:#0d2e0d;color:#81c784}
.vm-x{background:#3a0000;color:#ff8080}
.vm-q{background:#2e1a00;color:#ffb74d}
</style>
</head>

<!-- 이름 선택 모달 -->
<div id="name-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:997;align-items:center;justify-content:center;padding:24px">
  <div style="background:#242424;border-radius:18px;padding:24px;width:100%;max-width:360px;border:0.5px solid rgba(255,255,255,0.12)">
    <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:#c0a060;margin-bottom:6px;text-transform:uppercase">처음 오셨나요?</div>
    <div style="font-size:20px;font-weight:800;color:#fff;margin-bottom:4px">내 이름을 선택해주세요</div>
    <div style="font-size:13px;color:#666;margin-bottom:20px">한번만 선택하면 다음부터 자동으로 적용됩니다</div>
    <select id="modal-name-sel" style="width:100%;padding:12px 14px;font-size:16px;font-weight:600;border:0.5px solid rgba(255,255,255,0.2);border-radius:10px;background:#2e2e2e;color:#fff;margin-bottom:12px;-webkit-appearance:none;appearance:none">
      <option value="">-- 이름 선택 --</option>
    </select>
    <button onclick="confirmMyName()" style="width:100%;padding:13px;background:#8b0000;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.5px">확인</button>
    <button onclick="skipNameModal()" style="width:100%;padding:10px;background:transparent;color:#555;border:none;border-radius:10px;font-size:13px;cursor:pointer;margin-top:6px">나중에 선택하기</button>
  </div>
</div>

<div id="loading" style="display:none">
  <div class="ld-spin"></div>
  <div style="font-size:13px;color:#666">데이터 불러오는 중...</div>
</div>

<!-- 선수 수정 모달 -->
<div id="member-edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:997;align-items:flex-end;justify-content:center">
  <div class="edit-sheet">

let members=[],games=[],fees={},schedules=[],qSel=new Set(),appReady=false;
let myName = localStorage.getItem('suchon_myname')||'';
const ADMINS = ['이동근'];
function isAdmin(){ return ADMINS.includes(myName); }
function isSuperAdmin(){ return ADMINS.includes(myName); }

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function setDot(s,txt){document.getElementById('rtdot').className='rtdot '+s;document.getElementById('rttxt').textContent=txt;}
function posB(p){return PCB[p]||'bgy';}
function nameKey(n){return n.replace(/[^a-zA-Z0-9가-힣]/g,'_');}

async function initFirebase(){
  try{
    const snap=await get(ref(db,'suchon'));
    if(!snap.exists()){
      const mo={};INIT_MEMBERS.forEach(m=>{mo[m.id]=m;});
      const go={};INIT_GAMES.forEach(g=>{go[g.id]=g;});
      const so={};INIT_SCHEDULES.forEach(s=>{so[s.id]=s;});
      await set(ref(db,'suchon'),{members:mo,games:go,fees:INIT_FEES,schedules:so});
    }
    startListeners();
  }catch(e){setDot('off','연결 실패');toast('Firebase 연결 실패');}
}

function startListeners(){
  onValue(ref(db,'suchon/members'),snap=>{
    const v=snap.val()||{};
    members=Object.values(v).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    if(appReady){renderMembers();renderQSel();fillNameSelect();updateNameBanner();}
  });
  onValue(ref(db,'suchon/games'),snap=>{
    const v=snap.val()||{};
    games=Object.values(v).sort((a,b)=>b.date.localeCompare(a.date));
    if(appReady)renderGames();
  });
  onValue(ref(db,'suchon/fees'),snap=>{
    fees=snap.val()||{};
    if(appReady&&document.getElementById('s-fee').classList.contains('on'))renderFee();
  });
  onValue(ref(db,'suchon/schedules'),snap=>{
    const v=snap.val()||{};
    schedules=Object.values(v).sort((a,b)=>a.date.localeCompare(b.date));
    if(appReady)renderSchedule();
  });
  setDot('ok','실시간 연결됨');
  appReady=true;
}

window.enterApp=function(){
  document.getElementById('splash').classList.add('fade');
  document.getElementById('loading').style.display='flex';
  setTimeout(()=>{
    document.getElementById('splash').style.display='none';
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('g-date').valueAsDate=new Date();
    document.getElementById('sc-date').valueAsDate=new Date();
    renderAll();
    initFirebase();
    if(!myName){
      setTimeout(()=>{ fillNameSelect(); document.getElementById('name-modal').style.display='flex'; },800);
    }
  },600);
  // 수정 모달 바깥 클릭 닫기
  document.getElementById('edit-modal').addEventListener('click',function(e){
    if(e.target===this) closeEditModal();
  });
  document.getElementById('member-edit-modal').addEventListener('click',function(e){
    if(e.target===this) closeMemberEdit();
  });
};

window.forceSync=function(){toast('실시간 자동 반영 중입니다');};

window.go=function(tab,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+tab).classList.add('on');
  btn.classList.add('on');
  if(tab==='fee')renderFee();
  if(tab==='stats')renderStats();
  if(tab==='quarter')renderQSel();
};

window.addMember=async function(){
  if(!isSuperAdmin()){toast('이동근만 선수를 추가할 수 있습니다');return;}
  const name=document.getElementById('m-name').value.trim();
  const num=parseInt(document.getElementById('m-num').value)||0;
  const pos=document.getElementById('m-pos').value;
  if(!name){toast('이름을 입력하세요');return;}
  if(members.find(m=>m.name===name)){toast('이미 등록된 선수');return;}
  const id='m'+Date.now();
  // 선수 등록
  await set(ref(db,'suchon/members/'+id),{id,name,num,pos});
  // 회비 초기화 (12개월)
  await set(ref(db,'suchon/fees/'+name),{1:false,2:false,3:false,4:false,5:false,6:false,7:false,8:false,9:false,10:false,11:false,12:false});
  // 기존 모든 경기에 해당 선수 미출전으로 추가
  const gameSnap=await get(ref(db,'suchon/games'));
  if(gameSnap.exists()){
    const gData=gameSnap.val();

    });

  toast(name+' 등록 완료 — 기존 경기 기록에도 추가되었습니다');

window.deleteMember=async function(id){
  if(!isSuperAdmin()){toast('이동근만 선수를 삭제할 수 있습니다');return;}
  const m=members.find(m=>m.id===id);
  if(!m||!confirm(m.name+' 삭제 시 회비·경기 기록도 함께 삭제됩니다. 계속할까요?'))return;
  // 선수 삭제
  await remove(ref(db,'suchon/members/'+id));
  // 회비 데이터 삭제
  await remove(ref(db,'suchon/fees/'+m.name));
  // 모든 경기에서 해당 선수 기록 삭제
  const gameSnap=await get(ref(db,'suchon/games'));
  if(gameSnap.exists()){
    const gData=gameSnap.val();
    const updates={};
    Object.keys(gData).forEach(gid=>{
      if(gData[gid].players&&gData[gid].players[m.name]){
        updates['suchon/games/'+gid+'/players/'+m.name]=null;
      }
    });
    if(Object.keys(updates).length>0) await update(ref(db),updates);
  }
  // 일정 투표에서도 삭제
  const schedSnap=await get(ref(db,'suchon/schedules'));
  if(schedSnap.exists()){
    const sData=schedSnap.val();
    const nk=m.name.replace(/[^a-zA-Z0-9가-힣]/g,'_');

    Object.keys(sData).forEach(sid=>{
      if(sData[sid].votes&&sData[sid].votes[nk]){
        updates2['suchon/schedules/'+sid+'/votes/'+nk]=null;
      }
    });
    if(Object.keys(updates2).length>0) await update(ref(db),updates2);
  }

};

window.calcQ=function(){
  const players=members.filter(m=>qSel.has(m.name));
  if(players.length<2){toast('2명 이상 선택');return;}
  const total=parseInt(document.getElementById('q-total').value)||80;
  const qc=parseInt(document.getElementById('q-cnt').value)||4;
  const qt=Math.floor(total/qc);
  const gks=players.filter(p=>p.pos==='GK');
  const field=players.filter(p=>p.pos!=='GK');
  const fpq=Math.min(10,field.length);
  const tsl=qc*fpq,spp=Math.floor(tsl/field.length),extra=tsl%field.length;
  const slots=field.map((p,i)=>({...p,qLeft:spp+(i<extra?1:0)}));
  const qs=Array.from({length:qc},(_,qi)=>{const ps=[];if(gks.length)ps.push({...gks[0]});return{num:qi+1,time:`${qi*qt+1}~${(qi+1)*qt}분`,players:ps};});
  const ord=[...Array(qc).keys()].sort(()=>Math.random()-0.5);
  slots.forEach(s=>{
    let a=0;
    for(const qi of ord){if(a>=s.qLeft)break;if(qs[qi].players.filter(p=>p.id!==gks[0]?.id).length<fpq){qs[qi].players.push(s);a++;}}
    for(let qi=0;qi<qc&&a<s.qLeft;qi++){if(qs[qi].players.filter(p=>p.id!==gks[0]?.id).length<fpq){qs[qi].players.push(s);a++;}}
  });
  const po={GK:0,DF:1,MF:2,FW:3};
  qs.forEach(q=>q.players.sort((a,b)=>(po[a.pos]||0)-(po[b.pos]||0)));
  const mins={};slots.forEach(s=>{mins[s.name]=s.qLeft*qt;});if(gks[0])mins[gks[0].name]=total;
  document.getElementById('q-result').innerHTML=`<div class="card">
    <div class="ct">${total}분 / ${qc}쿼터 / ${players.length}명</div>
    ${qs.map(q=>`<div class="qrc"><div class="qrt">Q${q.num} &nbsp;${q.time}</div><div class="qrp">${q.players.map(p=>`<span class="qrch">${p.pos} ${p.name}</span>`).join('')}</div></div>`).join('')}
    <div style="margin-top:10px;font-size:11px;font-weight:700;color:#777;margin-bottom:6px">출전 시간</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">${Object.entries(mins).map(([n,m])=>`<span class="badge bgg">${n} ${m}분</span>`).join('')}</div>
  </div>`;
};

function getStats(name){
  let played=0,goals=0,assists=0;
  games.forEach(g=>{const p=g.players&&g.players[name];if(p){if(p.played)played++;goals+=p.goals||0;assists+=p.assists||0;}});
  return{played,goals,assists};
}
function renderStats(){
  const total=games.length,wins=games.filter(g=>g.our>g.them).length;
  const draws=games.filter(g=>g.our===g.them).length;
  const goals=games.reduce((a,g)=>a+g.our,0);
  const conceded=games.reduce((a,g)=>a+g.them,0);
  document.getElementById('sum-stats').innerHTML=`
    <div class="sb"><div class="sbv">${total}</div><div class="sbl">총 경기</div></div>
    <div class="sb"><div class="sbv">${wins}승${draws}무${total-wins-draws}패</div><div class="sbl">전적</div></div>
    <div class="sb"><div class="sbv">${goals}</div><div class="sbl">총 득점</div></div>
    <div class="sb"><div class="sbv">${conceded}</div><div class="sbl">총 실점</div></div>`;
  const rows=[...members].map(m=>{const s=getStats(m.name);const paid=Object.values(fees[m.name]||{}).filter(Boolean).length;return{m,s,paid};})
    .sort((a,b)=>b.s.goals-a.s.goals||b.s.assists-a.s.assists);
  document.getElementById('stats-body').innerHTML=rows.map(({m,s,paid})=>`<tr>
    <td style="font-weight:700;color:#fff">${m.name}</td>
    <td><span class="badge ${posB(m.pos)}" style="font-size:10px">${m.pos}</span></td>
    <td style="color:#ccc">${s.played}</td>
    <td><span class="badge bgg">${s.goals}</span></td>
    <td><span class="badge bgb">${s.assists}</span></td>
    <td><span class="badge ${paid>=12?'bgg':paid>0?'bgo':'bgr'}">${paid}/12</span></td>
  </tr>`).join('');
}

window.createGameFromSchedule=async function(sid){

  const votes=s.votes||{};
  const attendNames=Object.values(votes).filter(v=>v.vote==='o').map(v=>v.name);
  const initPlayers={};
  attendNames.forEach(n=>{initPlayers[n]={played:true,goals:0,assists:0};});
  const id='g'+Date.now();
  await set(ref(db,'suchon/games/'+id),{
    id, scheduleId:sid,
    date:s.date, opp:s.opp||'미정',
    our:0, them:0,

  setTimeout(()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.sec').forEach(sc=>sc.classList.remove('on'));
    document.getElementById('s-match').classList.add('on');
    document.querySelectorAll('.tab')[3].classList.add('on');
    setTimeout(()=>selectGame(id),400);
  },600);
};
window.goToGame=function(gid){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.sec').forEach(sc=>sc.classList.remove('on'));
  document.getElementById('s-match').classList.add('on');
  document.querySelectorAll('.tab')[3].classList.add('on');
  setTimeout(()=>selectGame(gid),300);
};
window.openMemberEdit=function(id,name,num,pos){
  if(!isSuperAdmin()){toast('이동근만 수정할 수 있습니다');return;}
  document.getElementById('edit-mid').value=id;
  document.getElementById('edit-mname-orig').value=name;
  document.getElementById('edit-mname').value=name;
  document.getElementById('edit-mnum').value=num;
  document.getElementById('edit-mpos').value=pos;
  document.getElementById('member-edit-modal').style.display='flex';
};
window.closeMemberEdit=function(){
  document.getElementById('member-edit-modal').style.display='none';
};
window.saveMemberEdit=async function(){
  const id=document.getElementById('edit-mid').value;
  const origName=document.getElementById('edit-mname-orig').value;
  const newName=document.getElementById('edit-mname').value.trim();
  const num=parseInt(document.getElementById('edit-mnum').value)||0;
  const pos=document.getElementById('edit-mpos').value;
  if(!newName){toast('이름을 입력하세요');return;}
  // 이름이 변경된 경우 회비·경기기록 키도 이전
  if(newName!==origName){
    // 회비 이전
    const feeSnap=await get(ref(db,'suchon/fees/'+origName));
    if(feeSnap.exists()){
      await set(ref(db,'suchon/fees/'+newName),feeSnap.val());
      await remove(ref(db,'suchon/fees/'+origName));
    }
    // 경기 기록 이전
    const gameSnap=await get(ref(db,'suchon/games'));
    if(gameSnap.exists()){
      const gData=gameSnap.val();
      const updates={};
      Object.keys(gData).forEach(gid=>{
        if(gData[gid].players&&gData[gid].players[origName]){
          updates['suchon/games/'+gid+'/players/'+newName]=gData[gid].players[origName];
          updates['suchon/games/'+gid+'/players/'+origName]=null;
        }
      });
      if(Object.keys(updates).length>0) await update(ref(db),updates);
    }
    // 일정 투표 이전
    const schedSnap=await get(ref(db,'suchon/schedules'));
    if(schedSnap.exists()){
      const sData=schedSnap.val();
      const origNk=origName.replace(/[^a-zA-Z0-9가-힣]/g,'_');
      const newNk=newName.replace(/[^a-zA-Z0-9가-힣]/g,'_');
      const updates2={};
      Object.keys(sData).forEach(sid=>{
        if(sData[sid].votes&&sData[sid].votes[origNk]){
          updates2['suchon/schedules/'+sid+'/votes/'+newNk]={name:newName,vote:sData[sid].votes[origNk].vote};
          updates2['suchon/schedules/'+sid+'/votes/'+origNk]=null;
        }
      });
      if(Object.keys(updates2).length>0) await update(ref(db),updates2);
    }
  }
  // 선수 정보 업데이트
  await update(ref(db,'suchon/members/'+id),{name:newName,num,pos});
  closeMemberEdit();
  toast(origName+(newName!==origName?' → '+newName:'')+'  수정 완료');
};
window.openEditModal=function(sid){
  if(!isAdmin()){toast('관리자만 수정할 수 있습니다');return;}
  const s=schedules.find(sc=>sc.id===sid);
  if(!s) return;
  document.getElementById('edit-sid').value=sid;
  document.getElementById('edit-date').value=s.date||'';
  document.getElementById('edit-field').value=s.field||'';
  document.getElementById('edit-opp').value=s.opp||'';
  document.getElementById('edit-time').value=s.time||'';
  document.getElementById('edit-uni').value=s.uniform||'';
  document.getElementById('edit-mgr').value=s.mgr||'';
  document.getElementById('edit-modal').classList.add('show');
};
window.closeEditModal=function(){
  document.getElementById('edit-modal').classList.remove('show');
};
window.saveScheduleEdit=async function(){
  const sid=document.getElementById('edit-sid').value;
  if(!sid){toast('오류: 일정 ID 없음');return;}
  const date=document.getElementById('edit-date').value;
  if(!date){toast('날짜를 입력하세요');return;}
  await update(ref(db,'suchon/schedules/'+sid),{
    date,
    field:document.getElementById('edit-field').value.trim()||'미정',
    opp:document.getElementById('edit-opp').value.trim()||'미정',
    time:document.getElementById('edit-time').value.trim(),
    uniform:document.getElementById('edit-uni').value.trim(),
    mgr:document.getElementById('edit-mgr').value.trim(),
  });
  closeEditModal();
  toast('일정이 수정되었습니다');
};
window.addSchedule=async function(){
  if(!isAdmin()){toast('관리자만 일정을 추가할 수 있습니다');return;}
  const date=document.getElementById('sc-date').value;
  if(!date){toast('날짜 입력');return;}
  const id='s'+Date.now();
  await set(ref(db,'suchon/schedules/'+id),{
    id,date,
    field:document.getElementById('sc-field').value.trim()||'미정',
    opp:document.getElementById('sc-opp').value.trim()||'미정',
    time:document.getElementById('sc-time').value.trim(),
    uniform:document.getElementById('sc-uni').value.trim(),
    mgr:document.getElementById('sc-mgr').value.trim(),
    note:'',votes:{}
  });
  toast('일정 추가 완료');
};
window.deleteSchedule=async function(id){
  if(!isAdmin()){toast('관리자만 삭제할 수 있습니다');return;}
  if(!confirm('일정 삭제?'))return;
  await remove(ref(db,'suchon/schedules/'+id));
};
window.castVote=async function(sid,vote){
  if(!myName){toast('먼저 내 이름을 선택해주세요');return;}
  const nk=nameKey(myName);
  const cur=(schedules.find(s=>s.id===sid)?.votes||{})[nk];
  const newVote=cur===vote?null:vote;
  if(newVote===null){
    await remove(ref(db,'suchon/schedules/'+sid+'/votes/'+nk));
  }else{
    await update(ref(db,'suchon/schedules/'+sid+'/votes'),{[nk]:{name:myName,vote:newVote}});
  }
};
function renderSchedule(){
  const c=document.getElementById('schedule-list');
  const today=new Date().toISOString().slice(0,10);
  const upcoming=schedules.filter(s=>s.date>=today);
  const past=schedules.filter(s=>s.date<today);
  const renderCard=(s,isPast)=>{
    const votes=s.votes||{};
    const vList=Object.values(votes);
    const attend=vList.filter(v=>v.vote==='o');
    const absent=vList.filter(v=>v.vote==='x');
    const maybe=vList.filter(v=>v.vote==='?');
    const myVote=myName?votes[nameKey(myName)]?.vote:null;
    const linked=games.find(g=>g.scheduleId===s.id);
    return`<div class="vote-card" style="${isPast?'opacity:0.7':''}">
      <div class="vote-header">
        <div>
          <div class="vote-date">${s.date} <span style="font-size:12px;color:#888;font-weight:400">${s.field}</span></div>
          ${s.time?`<div class="vote-info">${s.time}${s.uniform?' · '+s.uniform:''}${s.mgr?' · 담당: '+s.mgr:''}</div>`:''}
          ${s.opp&&s.opp!=='미정'?`<div class="vote-opp">vs ${s.opp}</div>`:''}
        </div>
        ${isAdmin()?`<div style="display:flex;gap:5px;flex-shrink:0">
          <button class="bsm" style="background:#1a2a3a;color:#64b5f6" onclick="openEditModal('${s.id}')">수정</button>
          <button class="bsm" style="background:#3a0000;color:#ff8080" onclick="deleteSchedule('${s.id}')">삭제</button>
        </div>`:''}
      </div>
      ${!isPast?`<div class="vote-btns">
        <button class="vbtn attend ${myVote==='o'?'active':''}" onclick="castVote('${s.id}','o')">참석 ✓ ${attend.length}</button>
        <button class="vbtn maybe ${myVote==='?'?'active':''}" onclick="castVote('${s.id}','?')">미정 ? ${maybe.length}</button>
        <button class="vbtn absent ${myVote==='x'?'active':''}" onclick="castVote('${s.id}','x')">불참 ✗ ${absent.length}</button>
      </div>`:''}
      <div class="vote-counts">
        <div class="vc"><div class="vc-num" style="color:#81c784">${attend.length}</div><div class="vc-lbl">참석</div></div>
        <div class="vc"><div class="vc-num" style="color:#ffb74d">${maybe.length}</div><div class="vc-lbl">미정</div></div>
        <div class="vc"><div class="vc-num" style="color:#ff8080">${absent.length}</div><div class="vc-lbl">불참</div></div>
        <div class="vc"><div class="vc-num" style="color:#aaa">${members.length-vList.length}</div><div class="vc-lbl">미응답</div></div>
      </div>
      ${vList.length>0?`<div class="vote-members">
        ${attend.map(v=>`<span class="vm-chip vm-o">${v.name}</span>`).join('')}
        ${maybe.map(v=>`<span class="vm-chip vm-q">${v.name}</span>`).join('')}
        ${absent.map(v=>`<span class="vm-chip vm-x">${v.name}</span>`).join('')}
      </div>`:'<div style="font-size:12px;color:#555">아직 투표한 팀원이 없습니다</div>'}
      ${isPast&&isAdmin()?`<div style="margin-top:10px">
        ${linked
          ?`<button onclick="goToGame('${linked.id}')" style="width:100%;padding:9px;background:#0a1e38;border:0.5px solid #1a3a6a;border-radius:8px;color:#64b5f6;font-size:13px;font-weight:700;cursor:pointer">📋 경기 기록 보기 / 수정</button>`
          :`<button onclick="createGameFromSchedule('${s.id}')" style="width:100%;padding:9px;background:#1b3a1b;border:0.5px solid #2d5a2d;border-radius:8px;color:#81c784;font-size:13px;font-weight:700;cursor:pointer">⚽ 경기 결과 입력하기</button>`
        }
      </div>`:''}
    </div>`;
  };
  let html='';
  if(upcoming.length){
    html+='<div style="font-size:11px;font-weight:700;color:#777;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px">예정 경기</div>';
    html+=upcoming.map(s=>renderCard(s,false)).join('');
  }
  if(past.length){
    html+=`<div style="font-size:11px;font-weight:700;color:#555;letter-spacing:0.8px;text-transform:uppercase;margin:16px 0 8px">지난 경기</div>`;
    html+=past.reverse().map(s=>renderCard(s,true)).join('');
  }
  if(!schedules.length) html='<div style="color:#555;text-align:center;padding:30px;font-size:14px">등록된 일정이 없습니다</div>';
  c.innerHTML=html;
}

function renderAll(){renderMembers();renderGames();renderSchedule();fillNameSelect();updateNameBanner();}
</script>
